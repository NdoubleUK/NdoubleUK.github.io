<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study</title>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --primary: #6366f1;
      --text: #e5e7eb;
      --sub: #9ca3af;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #1f2937;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .category {
      margin-bottom: 60px;
    }

    .category h2 {
      margin-bottom: 20px;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #1f2937;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .card p {
      color: var(--sub);
      font-size: 14px;
    }

    .back {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--sub);
      text-decoration: none;
    }

     .breadcrumb {
  margin-bottom: 30px;
  font-size: 14px;
  color: #9ca3af;
}

.breadcrumb a {
  color: #9ca3af;
  text-decoration: none;
}

.breadcrumb a:hover {
  color: #e5e7eb;
}

.breadcrumb span {
  margin: 0 6px;
}

  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="breadcrumb">
      <a href="../index.html">홈</a>
      <span>›</span>
      <span>Study Archive</span>
    </div>
  </div>
  
  <h1>Study Archive</h1>
</header>

<div class="container">
  <!-- 반도체 -->
  <div class="category">
    <h2>반도체</h2>
    <div class="grid">

      <div class="card">
        <h3>반도체 공정 정리</h3>
        <p>전체 공정 흐름 및 핵심 포인트 정리</p>          
        <a href="semiconductor/semiconductor_process.html" class="btn">자세히보기</a>
      </div>

      <div class="card">
        <h3>Inspection 알고리즘</h3>
        <p>검사 장비에서 사용하는 주요 알고리즘 분석</p>
      </div>

    </div>
  </div>

  <!-- 2차전지 -->
  <div class="category">
    <h2>2차전지</h2>
    <div class="grid">

      <div class="card">
        <h3>건식 전극 공정</h3>
        <p>Dry electrode 공정 이해 및 특징 정리</p>
      </div>

      <div class="card">
        <h3>검사 포인트 분석</h3>
        <p>전극 검사 시 주요 defect 유형 정리</p>
      </div>

    </div>
  </div>

  <!-- 디스플레이 -->
  <div class="category">
    <h2>디스플레이</h2>
    <div class="grid">

      <div class="card">
        <h3>OLED 구조</h3>
        <p>OLED 구조 및 발광 원리 정리</p>
      </div>

      <div class="card">
        <h3>패널 검사 기술</h3>
        <p>디스플레이 검사 방식 및 기술 분석</p>
      </div>

    </div>
  </div>

</div>

</body>
</html>
